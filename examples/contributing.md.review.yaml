# Re-anchoring scenario: Orphaned Comments + Line-Only Fallback (§7.4 Steps 2 & 4)
#
# This sidecar was written against an earlier version of contributing.md that
# had additional sections ("Release Process", "Deprecation Policy") which have
# since been removed. Some comments reference text that no longer exists.
#
# Additionally, some comments have NO selected_text — they rely purely on
# line numbers (§7.4 begins at Step 2 when selected_text is absent).
#
# A re-anchoring tool should:
#
#   - Comment A: Line-only fallback — no selected_text, line is still valid
#     → Anchors at the line, but flags as best-effort (Step 2a).
#   - Comment B: deleted text — selected_text gone, line references removed
#     section → Orphaned (Step 4).
#   - Comment C: deleted text — line is beyond document length
#     → Orphaned (Step 4).
#   - Comment D: Line-only fallback — line exists but content is unrelated
#     (document shrank, different content now at that line)
#     → Step 2b, falls through to Step 3/4.
#   - Comment E: selected_text present but section was rewritten entirely
#     → No exact match, no fuzzy match → Orphaned (Step 4).

mrsf_version: "1.0"
document: examples/contributing.md
comments:
  # -- Comment A: Line-only, no selected_text, line is still valid --
  # Line 5 contains "This project follows the Contributor Covenant Code of Conduct."
  # No selected_text → begin at Step 2. Line exists → Step 2a (anchor, best-effort).
