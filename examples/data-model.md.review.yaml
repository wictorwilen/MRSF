# Re-anchoring scenario: Threaded Replies, Mixed Anchor States, and Extensions
#
# This example demonstrates several MRSF features working together:
#
#   1. Threaded replies (reply_to) — replies inherit anchor context from parent.
#   2. Resolved vs open comments in the same file.
#   3. Extension fields (x_ prefix) for tool-specific metadata.
#   4. A mix of anchoring states: some exact, some stale, one document-level.
#   5. Multiple comment types and severities.
#
# This is a realistic "lived-in" review file that reflects ongoing collaboration.

