name: Bug Report
description: Report a bug in the CLI, MCP server, VS Code extension, or plugins
title: "[Bug]: "
labels: ["bug"]
body:
  - type: dropdown
    id: package
    attributes:
      label: Package
      description: Which package is affected?
      options:
        - "@mrsf/cli"
        - "@mrsf/mcp"
        - "mrsf-vscode (VS Code extension)"
        - "@mrsf/markdown-it-mrsf"
        - "@mrsf/rehype-mrsf"
        - "Specification (MRSF-v1.0.md)"
        - "Documentation site"
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: "Package version (run `mrsf --version` or check package.json)"
      placeholder: "0.3.0"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Steps to reliably reproduce the behavior.
      value: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: "OS, Node version, relevant sidecar/config files, error output, etc."
